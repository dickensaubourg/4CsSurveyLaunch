<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership Portal · The Cardwell Way</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#254deb; --navy:#00007b; --navy-dark:#0b1747; --off:#F5F5F7;
    --ink:#1F2937; --gray-mid:#5b6172; --line:#e5e7eb;
    --c1:#254deb; --c2:#00007b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--off);color:var(--ink);font-family:Inter,Arial,sans-serif;line-height:1.6}
  a{color:var(--blue)}

  /* Banner */
  .banner{position:relative;overflow:hidden;padding:30px 28px;background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 100%)}
  .banner-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,15,45,0.5),rgba(8,15,45,0.12) 60%,rgba(8,15,45,0) 100%)}
  .banner-inner{position:relative;z-index:1;max-width:920px;margin:0 auto}
  .banner-brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .banner-brand .divider{width:1px;height:28px;background:rgba(255,255,255,0.3)}
  .banner-brand .chip{background:#fff;border-radius:6px;padding:5px 9px;display:flex;align-items:center;height:36px}
  .banner-brand .chip img{max-height:26px;max-width:120px;display:block}
  .banner-eyebrow{color:rgba(255,255,255,0.85);font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
  .banner-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:34px;font-weight:700;color:#fff;margin:2px 0 4px;text-shadow:0 1px 4px rgba(0,0,0,0.35)}
  .banner-sub{color:rgba(255,255,255,0.92);font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
  .banner-tag{display:inline-block;margin-top:12px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.95);background:rgba(0,0,0,0.22);padding:5px 11px;border-radius:20px}

  .wrap{max-width:920px;margin:0 auto;padding:26px 22px 60px}

  /* Welcome / coaching note */
  .welcome{background:#fff;border:1px solid var(--line);border-left:4px solid var(--c1);border-radius:10px;padding:20px 22px;margin-bottom:22px}
  .welcome h2{font-family:"Cormorant Garamond",Georgia,serif;color:var(--navy);font-size:22px;margin:0 0 8px}
  .welcome p{margin:0 0 10px}

  /* Section cards */
  .section{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:18px;overflow:hidden}
  .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;cursor:pointer;border-bottom:1px solid transparent}
  .section.open .section-head{border-bottom-color:var(--line)}
  .section-title{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--navy-dark);font-size:16px}
  .section-chev{color:var(--gray-mid);transition:transform .15s;font-size:13px}
  .section.open .section-chev{transform:rotate(90deg)}
  .section-kind{font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
  .kind-client{background:#E6F4EC;color:#1E7A46}
  .kind-internal{background:#F7ECE7;color:#9A3324}
  .section-body{display:none;padding:6px 20px 20px}
  .section.open .section-body{display:block}
  .section-actions{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap}
  .doc-frame{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff}

  .btn{font:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--navy);cursor:pointer}
  .btn:hover{border-color:var(--blue);color:var(--blue)}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-primary:hover{background:#1d3fc4;color:#fff}

  /* Resources */
  .links{list-style:none;margin:8px 0 0;padding:0}
  .links li{margin:0 0 8px}
  .links a{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-weight:600}
  .coaching-html{font-size:14px}
  .coaching-html p{margin:0 0 10px}

  .state{max-width:560px;margin:80px auto;text-align:center;padding:0 20px}
  .state-icon{font-size:34px;margin-bottom:10px}
  .state-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:26px;color:var(--navy);margin-bottom:8px}
  .state-sub{color:var(--gray-mid)}
  .spinner{width:30px;height:30px;border:3px solid #d7def5;border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:60px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  .foot{max-width:920px;margin:0 auto;padding:22px;color:var(--gray-mid);font-size:12px;text-align:center}
  .confidential-note{margin-top:18px;padding:14px 16px;background:#fff;border:1px dashed #c6cbe0;border-radius:8px;color:var(--gray-mid);font-size:12.5px}
</style>
</head>
<body>

<div id="app">
  <div class="spinner" id="boot-spinner"></div>
</div>

<script>
  var ENDPOINT_URL = 'https://script.google.com/macros/s/AKfycbwzXlTacI23nEX_J4fzYWhsiqXWzlHKYwAmmy_0j2QZFIxirR-T05C95IPsFHBYYw0A/exec';

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Slug from /leader/<slug> path, or ?slug= fallback.
  function getSlug(){
    var q = new URLSearchParams(location.search);
    if (q.get('slug')) return q.get('slug');
    var parts = location.pathname.replace(/\/+$/,'').split('/').filter(Boolean);
    var i = parts.indexOf('leader');
    if (i >= 0 && parts[i+1]) return parts[i+1];
    return parts.length ? parts[parts.length-1] : '';
  }

  function fmtDate(s){ try{ return new Date(s).toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}); }catch(e){ return ''; } }

  function stateView(icon, title, sub){
    document.getElementById('app').innerHTML =
      '<div class="state"><div class="state-icon">'+icon+'</div>'+
      '<div class="state-title">'+esc(title)+'</div>'+
      '<div class="state-sub">'+esc(sub)+'</div></div>';
  }

  var SECTION_DEFS = [
    { key:'analysis',  itemFlag:'analysis',  htmlField:'reportHtml',     title:'Survey Analysis Findings', kind:'client',  height:900 },
    { key:'leaderNav', itemFlag:'leaderNav', htmlField:'navHtml',        title:'Your Leader Navigation Plan', kind:'client', height:900 },
    { key:'summary',   itemFlag:'summary',   htmlField:'summaryHtml',    title:'Summary of Findings', kind:'client', height:900 },
    { key:'runOfShow', itemFlag:'runOfShow', htmlField:'runOfShowHtml',  title:'Workshop Run of Show', kind:'internal', height:900 },
    { key:'deck',      itemFlag:'deck',      htmlField:'deckHtml',       title:'Workshop Deck', kind:'client', height:700 }
  ];

  function render(portal){
    var c1 = portal.color1 || '#254deb', c2 = portal.color2 || '#00007b';
    document.documentElement.style.setProperty('--c1', c1);
    document.documentElement.style.setProperty('--c2', c2);

    var cardwellSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 313.1408 262.5304" width="40" height="33"><path fill="#ffffff" d="M75.6378,183.3854c-11.9523-13.3167-18.9947-30.4637-19.8322-48.3379-1.0436-22.2732,7.1502-43.3873,22.7974-59.0339,14.7579-14.7584,34.3794-22.8856,55.2507-22.8856,16.2503,0,31.7339,4.9423,44.7623,14.0924,1.5563,1.093,3.6392.969,4.9839-.3758l31.4705-31.4707c1.6474-1.6474,1.5317-4.421-.2907-5.8724C147.5776-24.022,39.2175-1.3273,6.9287,97.6075c-7.0645,21.6462-7.1796,45.1817-.1677,66.8449,20.8851,64.524,73.974,96.7654,127.0926,96.7654,28.6641,0,57.3345-9.4013,80.9278-28.1926,1.8218-1.451,1.937-4.2224.2902-5.8692l-31.4871-31.4872c-1.3414-1.3414-3.4208-1.4631-4.9751-.3755-31.5899,22.1042-75.9945,18.1489-102.9717-11.9079Z"/><path fill="#ffffff" d="M307.2864,141.6265c5.7181-5.7239,5.7182-14.9981.0002-20.7221l-72.4052-72.4808c-1.5273-1.527-4.0031-1.527-5.5304,0l-31.153,31.1535c-1.5271,1.5271-1.5271,4.0031,0,5.5302l43.3919,43.3919c1.5271,1.5271,1.5271,4.003,0,5.5301l-43.5784,43.5786c-1.5272,1.5273-1.5272,4.0034,0,5.5307l31.1532,31.153c1.527,1.527,4.0031,1.527,5.5301,0l72.5914-72.6651Z"/></svg>';
    var chip = portal.logo ? '<span class="chip"><img src="'+esc(portal.logo)+'" alt=""></span><span class="divider"></span>' : '';
    var leaderLine = [portal.leaderName, portal.leaderTitle].filter(Boolean).map(esc).join(' · ');

    var html = '';
    html += '<div class="banner"><div class="banner-overlay"></div><div class="banner-inner">'+
      '<div class="banner-brand">'+cardwellSvg+'<span class="divider"></span>'+chip+
        '<span class="banner-eyebrow">The Cardwell Way · 4C Model</span></div>'+
      '<div class="banner-title">'+esc(portal.projectName || 'Leadership Transformation')+'</div>'+
      '<div class="banner-sub">'+ (leaderLine ? 'Prepared for '+leaderLine : '') + (portal.clientName ? ((leaderLine?' · ':'') + esc(portal.clientName)) : '') +'</div>'+
      '<span class="banner-tag">Confidential · Leadership Portal</span>'+
      '</div></div>';

    html += '<div class="wrap">';

    // Welcome / coaching note
    if (portal.welcomeNote) {
      html += '<div class="welcome"><h2>Welcome</h2>' + paras(portal.welcomeNote) + '</div>';
    }

    // Content sections (iframes display the self-contained branded docs)
    var anyContent = false;
    SECTION_DEFS.forEach(function(def, idx){
      var included = portal.items && portal.items[def.itemFlag];
      var docHtml = portal[def.htmlField];
      if (!included || !docHtml) return;
      anyContent = true;
      var openCls = (idx === 0) ? ' open' : '';
      var kindCls = def.kind === 'internal' ? 'kind-internal' : 'kind-client';
      var kindLbl = def.kind === 'internal' ? 'Cardwell internal' : 'Client-facing';
      html += '<div class="section'+openCls+'" id="sec-'+def.key+'">'+
        '<div class="section-head" onclick="toggleSec(\''+def.key+'\')">'+
          '<span class="section-title"><span class="section-chev">▶</span>'+esc(def.title)+'</span>'+
          '<span class="section-kind '+kindCls+'">'+kindLbl+'</span>'+
        '</div>'+
        '<div class="section-actions"><button class="btn" onclick="printDoc(\''+def.key+'\')">⎙ Open &amp; print / save PDF</button></div>'+
        '<div class="section-body"><iframe class="doc-frame" id="frame-'+def.key+'" style="height:'+def.height+'px" sandbox="allow-same-origin allow-popups allow-modals"></iframe></div>'+
      '</div>';
    });

    // Coaching notes + resources
    var hasCoaching = (portal.coachingHtml && portal.coachingHtml.trim()) || (portal.links && portal.links.length);
    if (hasCoaching) {
      var body = '';
      if (portal.coachingHtml && portal.coachingHtml.trim()) body += '<div class="coaching-html">'+paras(portal.coachingHtml)+'</div>';
      if (portal.links && portal.links.length) {
        body += '<ul class="links">' + portal.links.map(function(l){
          if (!l || !l.url) return '';
          return '<li><a href="'+esc(l.url)+'" target="_blank" rel="noopener">🔗 '+esc(l.label || l.url)+'</a></li>';
        }).join('') + '</ul>';
      }
      html += '<div class="section open" id="sec-coaching">'+
        '<div class="section-head" onclick="toggleSec(\'coaching\')">'+
          '<span class="section-title"><span class="section-chev">▶</span>Coaching &amp; Resources</span>'+
          '<span class="section-kind kind-client">From Cardwell</span>'+
        '</div>'+
        '<div class="section-body">'+body+'</div>'+
      '</div>';
    }

    if (!anyContent && !hasCoaching && !portal.welcomeNote) {
      html += '<div class="confidential-note">Your Cardwell team is preparing your materials. Please check back soon.</div>';
    }

    html += '<div class="confidential-note">This portal is confidential and prepared for you by the Cardwell engagement team. Materials are working drafts shared to support your leadership of this transformation. For questions, contact your Cardwell engagement lead.</div>';
    html += '</div>'; // wrap

    html += '<div class="foot">The Cardwell Way · 4C Model' + (portal.publishedAt ? ' · Last updated ' + esc(fmtDate(portal.publishedAt)) : '') + '</div>';

    document.getElementById('app').innerHTML = html;

    // Fill iframes with the self-contained branded documents.
    SECTION_DEFS.forEach(function(def){
      var fr = document.getElementById('frame-'+def.key);
      if (fr) { fr.srcdoc = portal[def.htmlField] || ''; docFrames[def.key] = portal[def.htmlField] || ''; }
    });
  }

  var docFrames = {};

  function toggleSec(key){ var el = document.getElementById('sec-'+key); if (el) el.classList.toggle('open'); }

  function printDoc(key){
    var w = window.open('', '_blank');
    if (!w) { alert('Please allow pop-ups to open and print this document.'); return; }
    w.document.open(); w.document.write(docFrames[key] || ''); w.document.close();
    setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 500);
  }

  // Plain text with line breaks -> paragraphs.
  function paras(text){
    return String(text||'').split(/\n{2,}/).map(function(blk){
      return '<p>'+esc(blk).replace(/\n/g,'<br>')+'</p>';
    }).join('');
  }

  function boot(){
    var slug = getSlug();
    if (!slug) { stateView('🔗','Portal link incomplete','This page needs a project link from your Cardwell team.'); return; }
    fetch(ENDPOINT_URL + '?action=leaderPortal&slug=' + encodeURIComponent(slug))
      .then(function(r){ return r.json(); })
      .then(function(j){
        if (!j.success) { stateView('⚠️','Portal not available', j.error || 'Please contact your Cardwell engagement lead.'); return; }
        if (!j.published) {
          if (j.brand){ document.documentElement.style.setProperty('--c1', j.brand.color1||'#254deb'); document.documentElement.style.setProperty('--c2', j.brand.color2||'#00007b'); }
          stateView('🕊️','Your portal is being prepared','Your Cardwell team has not published your materials yet. Please check back soon.');
          return;
        }
        render(j.portal);
        document.title = (j.portal.projectName || 'Leadership Portal') + ' · The Cardwell Way';
      })
      .catch(function(){ stateView('⚠️','Could not load the portal','Please check your connection and try again, or contact your Cardwell engagement lead.'); });
  }
  boot();
</script>
</body>
</html>
